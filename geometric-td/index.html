<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Geometric TD</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- Update nudge: shown by update.js when a newer build is deployed -->
    <div id="update-banner" class="hidden" role="button" tabindex="0">
      <span class="update-text">&#8635; UPDATE AVAILABLE — TAP TO RELOAD</span>
      <button class="update-dismiss" aria-label="Dismiss">&#10005;</button>
    </div>

    <!-- Top HUD: money / wave / core health -->
    <header id="hud">
      <div class="hud-item" id="hud-money">
        <span class="hud-label">CREDITS</span>
        <span class="hud-value" id="money-value">0</span>
      </div>
      <div class="hud-item" id="hud-wave">
        <span class="hud-label">WAVE</span>
        <span class="hud-value" id="wave-value">-</span>
      </div>
      <div class="hud-item" id="hud-core">
        <span class="hud-label">CORE</span>
        <span class="hud-value" id="core-value">0</span>
      </div>
      <button class="hud-item" id="skills-button">
        <span class="hud-label">SKILLS</span>
        <span class="hud-value" id="skill-points-value">0</span>
      </button>
      <!-- Game speed: half / pause / double -->
      <div id="speed-controls">
        <button class="speed-btn" id="speed-slow" title="Half speed">&#9664;</button>
        <button class="speed-btn" id="speed-pause" title="Pause">&#10074;&#10074;</button>
        <button class="speed-btn" id="speed-fast" title="Double speed">&#9654;</button>
        <button class="speed-btn exit-btn" id="exit-button" title="Exit battle">&#10005;</button>
      </div>
    </header>

    <!-- Game canvas -->
    <main id="game-area">
      <canvas id="game-canvas"></canvas>

      <!-- Win / loss overlay -->
      <div id="overlay" class="hidden">
        <h1 id="overlay-title"></h1>
        <p id="overlay-subtitle"></p>
        <div id="overlay-note" class="hidden"></div>
        <div id="overlay-buttons"></div>
        <div id="overlay-items" class="hidden"></div>
      </div>

      <!-- Drop-reveal sequence: shown before the win/loss overlay when a
           battle ends with earned loot (U4 pizzazz pass). Tap to advance. -->
      <div id="drop-reveal" class="hidden"></div>

      <!-- Level select overlay (shown at startup) -->
      <div id="level-overlay" class="hidden">
        <h1>GEOMETRIC TD</h1>
        <div id="shards-readout">&#9670; <span id="shards-value">0</span></div>
        <!-- World pager: prev / world name + dots / next. Populated by ui.js -->
        <div id="world-nav">
          <button id="world-prev" class="world-arrow" aria-label="Previous world">&#9664;</button>
          <div id="world-heading">
            <span id="world-name">INNER GRID</span>
            <span id="world-dots"></span>
          </div>
          <button id="world-next" class="world-arrow" aria-label="Next world">&#9654;</button>
        </div>
        <div id="level-list"></div>
        <!-- Account-wide entries, pinned below the (scrolling) level list -->
        <div id="menu-actions"></div>

        <!-- Level detail bottom sheet (CIRCUIT_MENU_DESIGN.md M2): tapping a
             board node opens this instead of launching straight into battle. -->
        <div id="level-sheet-overlay" class="hidden">
          <div id="level-sheet"></div>
        </div>
      </div>

      <!-- Gear overlay: tower-first equipment screen (TOWERS/STASH tabs) -->
      <div id="gear-overlay" class="hidden">
        <div id="gear-header">
          <h1>TOWERS</h1>
          <button id="gear-help" aria-label="Gear guide">?</button>
        </div>
        <div id="gear-wallet"></div>
        <div id="gear-tabs">
          <button id="gear-tab-towers" class="gear-tab active">TOWERS</button>
          <button id="gear-tab-stash" class="gear-tab">STASH<span id="gear-stash-badge" class="gear-tab-badge hidden"></span></button>
        </div>
        <div id="gear-scroll">
          <div id="gear-view-towers"></div>
          <div id="gear-view-stash" class="hidden"></div>
        </div>
        <button id="gear-close" class="big-button">CLOSE</button>

        <!-- Bottom sheet: item detail / picker / equip-target / guide -->
        <div id="gear-sheet-overlay" class="hidden">
          <div id="gear-sheet"></div>
        </div>
      </div>

      <!-- Store overlay: persistent stock, Shard purchases and rerolls
           (GEAR_UI_DESIGN.md U5 — restyled with the gear-screen's tile/sheet
           components; no logic changes, P5 store logic untouched). -->
      <div id="store-overlay" class="hidden">
        <div id="store-header">
          <h1>STORE</h1>
        </div>
        <div id="store-wallet" class="store-wallet"></div>
        <div id="store-scroll">
          <div id="store-actions" class="gear-actions-row"></div>
          <div id="store-grid"></div>
        </div>
        <button id="store-close" class="big-button">CLOSE</button>

        <!-- Bottom sheet: item detail with BUY -->
        <div id="store-sheet-overlay" class="hidden">
          <div id="store-sheet"></div>
        </div>
      </div>

      <!-- Leaderboard overlay: shared online best-wave scores by level -->
      <div id="leaderboard-overlay" class="hidden">
        <h1>LEADERBOARD</h1>
        <p>ENDLESS BEST WAVE, BY LEVEL</p>
        <div id="nickname-bar">
          <input id="nickname-input" type="text" maxlength="16"
                 placeholder="YOUR NICKNAME" autocomplete="off"
                 autocapitalize="characters" spellcheck="false">
          <button id="nickname-save" class="lb-action">SAVE</button>
        </div>
        <button id="publish-scores" class="lb-action lb-publish">PUBLISH MY SCORES</button>
        <div id="leaderboard-msg"></div>
        <div id="leaderboard-list"></div>
        <button id="leaderboard-close" class="big-button">CLOSE</button>
      </div>

      <!-- Skill tree overlay -->
      <div id="skill-overlay" class="hidden">
        <h1>SKILL TREE</h1>
        <p id="skill-points-line"></p>
        <div id="skill-list"></div>
        <div id="skill-actions">
          <button id="skill-close" class="big-button">CLOSE</button>
          <button id="reset-save">RESET SAVE</button>
        </div>

        <!-- Bottom sheet: node detail with BUY -->
        <div id="skill-sheet-overlay" class="hidden">
          <div id="skill-sheet"></div>
        </div>
      </div>
    </main>

    <!-- Bottom action bar -->
    <footer id="action-bar">
      <!-- Tower buttons are generated from config.js by ui.js -->
      <div id="tower-buttons"></div>

      <!-- Shown instead of tower buttons when a placed tower is selected -->
      <div id="upgrade-panel" class="hidden">
        <div id="upgrade-info">
          <div class="upgrade-row">
            <span id="up-name"></span>
            <span id="up-level"></span>
          </div>
          <div class="upgrade-row dim">
            <span id="up-xp"></span>
          </div>
        </div>
        <button id="upgrade-button" class="big-button stack-button">
          <span id="upgrade-btn-label"></span>
          <span id="upgrade-btn-sub" class="stack-button-sub"></span>
        </button>
        <button id="sell-button" class="big-button stack-button">
          <span id="sell-btn-label">SELL</span>
          <span id="sell-btn-sub" class="stack-button-sub"></span>
        </button>
      </div>

      <button id="wave-button" class="big-button stack-button">
        <span id="wave-btn-label"></span>
        <span id="wave-btn-sub" class="stack-button-sub"></span>
      </button>
    </footer>

  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
