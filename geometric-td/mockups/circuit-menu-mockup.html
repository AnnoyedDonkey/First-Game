<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Circuit Menu Mockup — Geometric TD</title>
<style>
  :root {
    --bg: #05070d;
    --text: #cfe8ff;
    --dim: #5a6b80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    display: flex; flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  header { text-align: center; padding: 14px 0 4px; }
  header h1 { font-size: 20px; letter-spacing: 4px; color: #8ff; text-shadow: 0 0 12px rgba(0,255,255,.6); }
  header .shards { font-size: 12px; color: #ffd76a; margin-top: 2px; }

  .world-nav {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 6px 0;
  }
  .world-nav button {
    background: none; border: 1px solid #234; color: #8ff; font-size: 16px;
    width: 34px; height: 30px; border-radius: 6px; cursor: pointer;
  }
  .world-nav button:disabled { opacity: .25; }
  #world-name { font-size: 14px; letter-spacing: 3px; min-width: 150px; text-align: center; }
  .dots { display: flex; gap: 6px; justify-content: center; padding-bottom: 4px; }
  .dots span { width: 6px; height: 6px; border-radius: 50%; background: #234; }
  .dots span.active { background: #8ff; box-shadow: 0 0 6px #8ff; }

  #board-wrap { flex: 1; position: relative; overflow: hidden; }
  #board-wrap svg { width: 100%; height: 100%; display: block; touch-action: pan-y; }

  footer {
    display: flex; gap: 8px; padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  }
  footer button {
    flex: 1; background: #0a1220; border: 1px solid #1c3550; color: #9fd6ff;
    padding: 10px 0; border-radius: 8px; font-family: inherit; font-size: 12px;
    letter-spacing: 1px;
  }

  /* ---------- bottom sheet ---------- */
  #sheet-veil {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  #sheet-veil.open { opacity: 1; pointer-events: auto; }
  #sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: #070d18; border-top: 1px solid #1c3550;
    border-radius: 16px 16px 0 0;
    padding: 16px 18px calc(18px + env(safe-area-inset-bottom));
    transform: translateY(105%); transition: transform .25s cubic-bezier(.2,.8,.25,1);
    max-height: 72vh; overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(0,200,255,.12);
  }
  #sheet.open { transform: translateY(0); }
  #sheet h2 { font-size: 16px; letter-spacing: 2px; margin-bottom: 2px; }
  #sheet .lvl-tag { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 8px; }
  #sheet p.desc { font-size: 12px; line-height: 1.5; color: #9ab4cc; margin-bottom: 12px; }
  .status-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .chip {
    font-size: 10px; letter-spacing: 1px; padding: 4px 8px; border-radius: 20px;
    border: 1px solid #234; color: var(--dim);
  }
  .chip.on { border-color: #2fd6a8; color: #2fd6a8; box-shadow: 0 0 8px rgba(47,214,168,.35); }
  .chip.gold { border-color: #ffd76a; color: #ffd76a; }

  .mile-head { font-size: 11px; letter-spacing: 2px; color: #8ff; margin: 10px 0 6px; }
  .mile { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 11px; }
  .mile .tick {
    width: 14px; height: 14px; border-radius: 50%; flex: none;
    border: 1.5px solid #2a3a50; position: relative;
  }
  .mile.done .tick { border-color: #ffd76a; background: radial-gradient(circle, #ffd76a 40%, transparent 70%); box-shadow: 0 0 8px rgba(255,215,106,.6); }
  .mile .m-label { color: #9ab4cc; }
  .mile.done .m-label { color: #ffe9b0; }
  .mile .m-reward { margin-left: auto; color: var(--dim); }
  .mile.done .m-reward { color: #ffd76a; }

  .sheet-buttons { display: flex; gap: 10px; margin-top: 14px; }
  .sheet-buttons button {
    flex: 1; padding: 12px 0; border-radius: 8px; font-family: inherit;
    font-size: 13px; letter-spacing: 2px; border: 1px solid;
  }
  .play-btn { background: rgba(0,255,255,.08); border-color: #0ff; color: #aff; text-shadow: 0 0 8px #0ff; }
  .endless-btn { background: rgba(255,120,220,.08); border-color: #f7c; color: #fbd; }
  .endless-btn:disabled { opacity: .3; }

  @keyframes nodePulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  @keyframes flowDash { to { stroke-dashoffset: -40; } }
  .trace-flow { animation: flowDash 2.2s linear infinite; }
  .frontier-pulse { animation: nodePulse 1.6s ease-in-out infinite; }
</style>
</head>
<body>
<header>
  <h1>GEOMETRIC TD</h1>
  <div class="shards">◆ 1,240</div>
</header>
<div class="world-nav">
  <button id="prev">◀</button>
  <div id="world-name">INNER GRID</div>
  <button id="next">▶</button>
</div>
<div class="dots" id="dots"></div>
<div id="board-wrap"></div>
<footer>
  <button>SKILLS ●2</button><button>TOWERS</button><button>STORE</button><button>BOARD</button>
</footer>

<div id="sheet-veil"></div>
<div id="sheet"></div>

<script>
// ---------------- mock data ----------------
// state: "cleared" | "frontier" (next to play) | "locked"
// endless: unlocked when cleared. milestones: done/total
const WORLDS = [
  {
    name: "INNER GRID", accent: "#22d6ff", accent2: "#2fd6a8",
    style: "grid",
    levels: [
      { n: 1,  name: "First Contact",  state: "cleared", best: 34, miles: 4, total: 5,
        desc: "A gentle serpentine through the inner lattice. Grunts only — learn the grid, plant your first Laser." },
      { n: 2,  name: "Signal Breach",  state: "cleared", best: 21, miles: 3, total: 5,
        desc: "Fast movers slip through a chevron zigzag. Lasers shred them — if they can reach." },
      { n: 3,  name: "Dark Relay",     state: "cleared", best: 12, miles: 1, total: 5,
        desc: "Armored crawlers on a perimeter grand tour. Lasers bounce off — bring Pulse." },
      { n: 4,  name: "Split Second",   state: "cleared", best: 0,  miles: 0, total: 5,
        desc: "Splitters double on death down a staircase path. Splash damage or drown in fragments." },
      { n: 5,  name: "Core Siege",     state: "frontier", best: 0, miles: 0, total: 5,
        desc: "The first boss stands at the end of a triple spiral. Only the interior pockets hold. Clearing this unlocks the RAILGUN." },
    ],
  },
  {
    name: "OUTER VOID", accent: "#ff9d3c", accent2: "#ffd76a",
    style: "diagonal",
    levels: [
      { n: 6,  name: "Ember Relay",       state: "cleared", best: 18, miles: 2, total: 20,
        desc: "Beyond the grid the paths burn. Regenerators appear — sustained Railgun fire stops the healing." },
      { n: 7,  name: "Toxic Sink",        state: "frontier", best: 0, miles: 0, total: 20,
        desc: "A vertical comb drips with splitter swarms. Pulse and patience." },
      { n: 8,  name: "Ultraviolet Maze",  state: "locked", best: 0, miles: 0, total: 20,
        desc: "Full-width maze sweeps under UV light. Everything is faster here." },
      { n: 9,  name: "Glacier Run",       state: "locked", best: 0, miles: 0, total: 20,
        desc: "Long frozen straights — Railgun heaven, if you aim down the lanes." },
      { n: 10, name: "Solar Core",        state: "locked", best: 0, miles: 0, total: 20,
        desc: "The void's furnace. Survive it to unlock the ROCKET LAUNCHER." },
    ],
  },
  {
    name: "PRISM DEEP", accent: "#e05cff", accent2: "#ff5ca8",
    style: "prism",
    levels: [
      { n: 11, name: "Crimson Vein",   state: "locked", best: 0, miles: 0, total: 5, desc: "Single-hue depths. A bottom-entry spiral of blood-red light." },
      { n: 12, name: "Abyssal Teal",   state: "locked", best: 0, miles: 0, total: 5, desc: "Step cascades in cold teal. Armored columns march in pairs." },
      { n: 13, name: "Violet Pulse",   state: "locked", best: 0, miles: 0, total: 5, desc: "A plus-detour pulsing violet. Regenerator bosses on cadence." },
      { n: 14, name: "Silver Null",    state: "locked", best: 0, miles: 0, total: 5, desc: "A switchback ladder in dead silver. Everything resists something." },
      { n: 15, name: "Prismatic Core", state: "locked", best: 0, miles: 0, total: 5, desc: "The final chamber. All seven enemy forms, all at once." },
    ],
  },
];

// Node positions per world (viewBox 0..100 x 0..130) — winding top→bottom.
const LAYOUTS = [
  [ {x:24,y:16},{x:72,y:33},{x:28,y:56},{x:66,y:80},{x:50,y:108} ],
  [ {x:70,y:14},{x:24,y:36},{x:62,y:58},{x:30,y:84},{x:68,y:108} ],
  [ {x:50,y:14},{x:22,y:42},{x:78,y:42},{x:32,y:84},{x:64,y:104} ],
];

let cur = 0;
const wrap = document.getElementById("board-wrap");
const sheet = document.getElementById("sheet");
const veil = document.getElementById("sheet-veil");

function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

// ---- decorative circuit traces, per world style ----
function decoTraces(style, a) {
  const seg = [];
  const line = (d, w, o, cls="") =>
    seg.push(`<path d="${d}" fill="none" stroke="${a}" stroke-width="${w}" opacity="${o}" stroke-linecap="round" class="${cls}" ${cls?'stroke-dasharray="3 9"':''}/>`);
  const pad = (x,y,r,o)=> seg.push(`<circle cx="${x}" cy="${y}" r="${r}" fill="none" stroke="${a}" stroke-width=".5" opacity="${o}"/><circle cx="${x}" cy="${y}" r="${r*0.35}" fill="${a}" opacity="${o*0.8}"/>`);
  const hex = (x,y,r,o)=>{ let p=""; for(let i=0;i<6;i++){const t=Math.PI/3*i-Math.PI/6; p+=(i?"L":"M")+(x+r*Math.cos(t)).toFixed(1)+" "+(y+r*Math.sin(t)).toFixed(1);} seg.push(`<path d="${p}Z" fill="none" stroke="${a}" stroke-width=".5" opacity="${o}"/>`); };

  if (style === "grid") {
    // orthogonal PCB traces with 90° bends + via pads
    line("M6 8 H40 V22 H14 V40", .7, .22); pad(14,40,1.6,.5);
    line("M94 6 V26 H86 V48", .7, .22); pad(86,48,1.6,.5);
    line("M4 70 H16 V92 H8 V118", .7, .18); pad(8,118,1.6,.4);
    line("M96 66 V88 H88 V112 H94", .7, .18); pad(94,112,1.6,.4);
    line("M10 55 H20", .5, .3); pad(10,55,1.2,.5);
    line("M90 58 H82", .5, .3); pad(90,58,1.2,.5);
    line("M48 2 V8 H60", .5, .25); pad(60,8,1.2,.45);
  } else if (style === "diagonal") {
    // 45° amber traces + hex pads (void tech)
    line("M4 22 L18 8 H34", .7, .22); hex(4,22,2.2,.5);
    line("M96 30 L84 18 H70", .7, .22); hex(96,30,2.2,.5);
    line("M6 64 L18 52", .6, .25); hex(6,64,2,.45);
    line("M94 78 L82 66", .6, .25); hex(94,78,2,.45);
    line("M10 122 L26 106 H40", .7, .18); hex(10,122,2.2,.4);
    line("M92 118 L78 104", .6, .2); hex(92,118,2,.45);
    line("M50 2 L58 10", .5, .25); hex(50,2,1.8,.4);
  } else {
    // prism: radial shards + concentric arcs
    line("M50 64 L12 20", .5, .15); line("M50 64 L88 20", .5, .15);
    line("M50 64 L8 96", .5, .12); line("M50 64 L92 96", .5, .12);
    seg.push(`<circle cx="50" cy="64" r="44" fill="none" stroke="${a}" stroke-width=".4" opacity=".14"/>`);
    seg.push(`<circle cx="50" cy="64" r="55" fill="none" stroke="${a}" stroke-width=".4" opacity=".09"/>`);
    pad(12,20,1.6,.4); pad(88,20,1.6,.4); pad(8,96,1.4,.35); pad(92,96,1.4,.35);
  }
  return seg.join("");
}

// connector between two nodes, per world style
function connector(p1, p2, style) {
  if (style === "grid") {
    const my = (p1.y + p2.y) / 2;
    return `M${p1.x} ${p1.y} V${my} H${p2.x} V${p2.y}`;
  }
  if (style === "diagonal") {
    // 45° dogleg: vertical then diagonal into target
    const dx = p2.x - p1.x, sy = p2.y - Math.abs(dx);
    return `M${p1.x} ${p1.y} V${sy} L${p2.x} ${p2.y}`;
  }
  // prism: straight shard lines
  return `M${p1.x} ${p1.y} L${p2.x} ${p2.y}`;
}

// milestone tick ring around a node (works for 5 or 20 ticks)
function tickRing(x, y, r, done, total, color) {
  let out = "";
  const gapDeg = total > 10 ? 6 : 14;              // tighter ticks when 20
  const arc = 360 / total;
  for (let i = 0; i < total; i++) {
    const a0 = -90 + i * arc + gapDeg / 2, a1 = -90 + (i + 1) * arc - gapDeg / 2;
    const p = (a) => { const t = a * Math.PI / 180; return `${(x + r * Math.cos(t)).toFixed(2)} ${(y + r * Math.sin(t)).toFixed(2)}`; };
    const lit = i < done;
    out += `<path d="M${p(a0)} A${r} ${r} 0 0 1 ${p(a1)}" fill="none"
      stroke="${lit ? "#ffd76a" : "rgba(120,140,170,.28)"}" stroke-width="${lit ? 1.4 : 1}"
      stroke-linecap="round" ${lit ? `filter="url(#glow)"` : ""}/>`;
  }
  return out;
}

function render() {
  const w = WORLDS[cur];
  const pts = LAYOUTS[cur];
  document.getElementById("world-name").textContent = w.name;
  document.getElementById("world-name").style.color = w.accent;
  document.getElementById("prev").disabled = cur === 0;
  document.getElementById("next").disabled = cur === WORLDS.length - 1;
  document.getElementById("dots").innerHTML =
    WORLDS.map((_, i) => `<span class="${i === cur ? "active" : ""}"></span>`).join("");

  let svg = `<svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="1.1" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <radialGradient id="vign" cx="50%" cy="45%" r="75%">
        <stop offset="60%" stop-color="transparent"/><stop offset="100%" stop-color="rgba(0,0,0,.55)"/>
      </radialGradient>
    </defs>`;

  svg += decoTraces(w.style, w.accent);

  // connectors between consecutive levels
  for (let i = 0; i < pts.length - 1; i++) {
    const from = w.levels[i], d = connector(pts[i], pts[i + 1], w.style);
    const lit = from.state === "cleared";
    svg += `<path d="${d}" fill="none" stroke="${lit ? w.accent : "rgba(90,110,140,.35)"}"
      stroke-width="${lit ? 1.1 : .8}" ${lit ? `filter="url(#glow)"` : `stroke-dasharray="2 3"`}/>`;
    if (lit) // energy flowing along cleared traces
      svg += `<path d="${d}" fill="none" stroke="#ffffff" stroke-width=".7" opacity=".8"
        stroke-dasharray="1.5 38.5" class="trace-flow" filter="url(#glow)"/>`;
  }

  // level nodes
  w.levels.forEach((lv, i) => {
    const { x, y } = pts[i];
    const R = 7.5;
    svg += `<g data-i="${i}" style="cursor:pointer">`;
    // invisible fat hit target
    svg += `<circle cx="${x}" cy="${y}" r="13" fill="rgba(0,0,0,0)"/>`;

    if (lv.state === "locked") {
      svg += `<circle cx="${x}" cy="${y}" r="${R}" fill="#0a0f18" stroke="rgba(90,110,140,.5)" stroke-width=".8" stroke-dasharray="2 2"/>
        <text x="${x}" y="${y + 1.8}" text-anchor="middle" font-size="5" fill="rgba(120,140,170,.6)">🔒</text>`;
    } else if (lv.state === "frontier") {
      svg += `<circle cx="${x}" cy="${y}" r="${R + 3.4}" fill="none" stroke="${w.accent}" stroke-width=".6" class="frontier-pulse" filter="url(#glow)"/>
        <circle cx="${x}" cy="${y}" r="${R}" fill="#0a1220" stroke="${w.accent}" stroke-width="1.3" filter="url(#glow)"/>
        <text x="${x}" y="${y + 2.4}" text-anchor="middle" font-size="6.5" fill="${w.accent}" filter="url(#glow)" font-family="inherit">${lv.n}</text>`;
    } else { // cleared
      svg += tickRing(x, y, R + 3.6, lv.miles, lv.total, w.accent);
      svg += `<circle cx="${x}" cy="${y}" r="${R}" fill="rgba(0,60,70,.5)" stroke="${w.accent}" stroke-width="1.2" filter="url(#glow)"/>
        <circle cx="${x}" cy="${y}" r="${R - 2.4}" fill="${w.accent}" opacity=".18"/>
        <text x="${x}" y="${y + 2.4}" text-anchor="middle" font-size="6.5" fill="#eaffff" filter="url(#glow)">${lv.n}</text>`;
      // endless badge: ∞ pad wired off the node, gold when best>0
      const bx = x + R + 4.2, by = y + R + 2.5;
      svg += `<path d="M${x + R * 0.72} ${y + R * 0.72} L${bx - 2} ${by - 1.4}" stroke="${w.accent}" stroke-width=".5" opacity=".6"/>
        <circle cx="${bx}" cy="${by}" r="3.4" fill="#0a1220" stroke="${lv.best > 0 ? "#ff7ccb" : w.accent2}" stroke-width=".8" ${lv.best > 0 ? 'filter="url(#glow)"' : 'opacity=".75"'}/>
        <text x="${bx}" y="${by + 1.7}" text-anchor="middle" font-size="4.6" fill="${lv.best > 0 ? "#ffb3de" : w.accent2}">∞</text>`;
    }
    svg += `</g>`;
  });

  svg += `<rect x="0" y="0" width="100" height="130" fill="url(#vign)" pointer-events="none"/></svg>`;
  wrap.innerHTML = svg;

  wrap.querySelectorAll("g[data-i]").forEach((g) =>
    g.addEventListener("click", () => openSheet(w, w.levels[+g.dataset.i]))
  );
}

// ---------------- bottom sheet ----------------
const MILE_REWARDS_5 = ["◆ 100", "RARE LOOT", "◆ 350", "PRISMATIC LOOT", "SINGULARITY"];
const WAVES_5 = [10, 20, 35, 50, 75];

function openSheet(w, lv) {
  const cleared = lv.state === "cleared";
  const total = lv.total;
  let miles = "";
  for (let i = 0; i < total; i++) {
    const wave = total === 5 ? WAVES_5[i] : 5 + i * 5;
    const reward = total === 5 ? MILE_REWARDS_5[i] : (i % 2 ? "LOOT" : `◆ ${100 + i * 50}`);
    const done = i < lv.miles;
    miles += `<div class="mile ${done ? "done" : ""}">
      <div class="tick"></div>
      <span class="m-label">Reach wave ${wave}</span>
      <span class="m-reward">${reward}</span></div>`;
  }
  sheet.innerHTML = `
    <h2 style="color:${w.accent}">${esc(lv.name.toUpperCase())}</h2>
    <div class="lvl-tag">LEVEL ${lv.n} — ${w.name}</div>
    <p class="desc">${esc(lv.desc)}</p>
    <div class="status-row">
      <span class="chip ${cleared ? "on" : ""}">${cleared ? "✓ CLEARED" : lv.state === "frontier" ? "NOT CLEARED" : "🔒 LOCKED"}</span>
      <span class="chip ${cleared ? "on" : ""}">∞ ENDLESS ${cleared ? (lv.best ? "— BEST W" + lv.best : "UNLOCKED") : "LOCKED"}</span>
      ${cleared ? `<span class="chip gold">★ ${lv.miles}/${total} MILESTONES</span>` : ""}
    </div>
    ${cleared ? `<div class="mile-head">ENDLESS MILESTONES</div>${miles}` : `<p class="desc" style="color:#5a6b80">${lv.state === "locked" ? "Clear the previous level to unlock." : "Beat the campaign level to unlock Endless mode and its milestone rewards."}</p>`}
    <div class="sheet-buttons">
      <button class="play-btn" ${lv.state === "locked" ? "disabled" : ""}>▶ PLAY</button>
      <button class="endless-btn" ${cleared ? "" : "disabled"}>∞ ENDLESS</button>
    </div>`;
  sheet.classList.add("open");
  veil.classList.add("open");
}
veil.addEventListener("click", () => { sheet.classList.remove("open"); veil.classList.remove("open"); });

document.getElementById("prev").addEventListener("click", () => { if (cur > 0) { cur--; render(); } });
document.getElementById("next").addEventListener("click", () => { if (cur < 2) { cur++; render(); } });

// horizontal swipe between worlds
let x0 = null, y0 = null;
wrap.addEventListener("touchstart", (e) => { x0 = e.touches[0].clientX; y0 = e.touches[0].clientY; }, { passive: true });
wrap.addEventListener("touchend", (e) => {
  if (x0 == null) return;
  const dx = e.changedTouches[0].clientX - x0, dy = e.changedTouches[0].clientY - y0;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0 && cur < 2) cur++; else if (dx > 0 && cur > 0) cur--;
    render();
  }
  x0 = null;
}, { passive: true });

render();
</script>
</body>
</html>
